<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ard El Dyar - خدمة الطاولات</title>
<style>
  :root {
    --gold: #c9a227;
    --copper: #b5651d;
    --bg-dark: #161310;
    --bg-card: #211c17;
    --text-light: #f3e9d2;
    --text-dim: #b8a98a;
    --green: #3fae5a;
    --red: #d9534f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #2a2218 0%, var(--bg-dark) 70%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 1.4rem; color: var(--gold); margin: 4px 0 2px; text-align: center; }
  .sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 24px; text-align: center; }
  .card {
    background: var(--bg-card);
    border: 1px solid #3a3024;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    margin-bottom: 18px;
  }

  /* CUSTOMER VIEW */
  .table-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--copper));
    color: #1a1408;
    font-weight: bold;
    padding: 6px 18px;
    border-radius: 999px;
    margin-bottom: 18px;
    font-size: 1rem;
  }
  .action-btn {
    width: 100%;
    padding: 18px;
    margin-bottom: 14px;
    border-radius: 14px;
    border: 1px solid #4a3c28;
    background: #2a2218;
    color: var(--text-light);
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.1s, background 0.2s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn.server { border-color: var(--gold); }
  .action-btn.bill { border-color: var(--copper); }
  .action-btn:disabled { opacity: 0.55; cursor: default; }
  .status-msg {
    text-align: center;
    color: var(--green);
    font-weight: 600;
    margin-top: 10px;
    min-height: 20px;
  }

  /* STAFF VIEW */
  .req-item {
    background: #2a2218;
    border-right: 4px solid var(--gold);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .req-item.bill { border-color: var(--copper); }
  .req-left { display: flex; flex-direction: column; gap: 4px; }
  .req-table { font-weight: bold; font-size: 1.1rem; color: var(--gold); }
  .req-type { font-size: 0.95rem; color: var(--text-light); }
  .req-time { font-size: 0.75rem; color: var(--text-dim); }
  .done-btn {
    background: var(--green);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
  }
  .empty-state { text-align: center; color: var(--text-dim); padding: 30px 0; }

  /* SETUP / QR VIEW */
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .qr-cell {
    background: #fff;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .qr-cell img { width: 100%; height: auto; display: block; }
  .qr-label { color: #1a1408; font-weight: bold; margin-top: 6px; font-size: 0.9rem; }
  input, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #4a3c28;
    background: #1a1610;
    color: var(--text-light);
    margin-bottom: 10px;
    font-size: 0.95rem;
  }
  .tab-row { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #4a3c28;
    background: #2a2218;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.85rem;
  }
  .tab-btn.active { background: var(--gold); color: #1a1408; font-weight: bold; }
  .small-note { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }
  .print-btn {
    background: var(--copper); color: #fff; border: none; padding: 10px 16px;
    border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 12px; width: 100%;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const root = document.getElementById('root');
const params = new URLSearchParams(window.location.search);
const tableParam = params.get('table');
const isStaff = params.get('staff') === '1';

// ---------- Firebase Realtime Database config ----------
// Paste your Firebase Realtime Database URL here, e.g. "https://your-project-default-rtdb.firebaseio.com"
const FIREBASE_URL = "https://ard-eldyar-default-rtdb.firebaseio.com";

const storage = {
  async list() {
    const res = await fetch(`${FIREBASE_URL}/requests.json`);
    const data = await res.json();
    if (!data) return [];
    return Object.entries(data).map(([key, val]) => ({ key, ...val }));
  },
  async set(key, value) {
    await fetch(`${FIREBASE_URL}/requests/${key}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(value)
    });
  },
  async delete(key) {
    await fetch(`${FIREBASE_URL}/requests/${key}.json`, { method: 'DELETE' });
  }
};

// ---------- Helpers ----------
function nowStr() {
  return new Date().toLocaleTimeString('ar-JO', { hour: '2-digit', minute: '2-digit' });
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    o.start();
    o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.stop(ctx.currentTime + 0.5);
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

// ---------- CUSTOMER VIEW ----------
async function renderCustomer(table) {
  root.innerHTML = `
    <h1>Ard El Dyar - أرض الديار</h1>
    <div class="sub">خدمة الطاولات</div>
    <div class="card" style="text-align:center;">
      <div class="table-badge">طاولة رقم ${table}</div>
      <button class="action-btn server" id="btnServer">🛎️ طلب نادل</button>
      <button class="action-btn bill" id="btnBill">🧾 طلب الفاتورة</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  `;

  const status = document.getElementById('statusMsg');
  const btnServer = document.getElementById('btnServer');
  const btnBill = document.getElementById('btnBill');

  async function sendRequest(type, label) {
    btnServer.disabled = true;
    btnBill.disabled = true;
    status.textContent = 'جارٍ الإرسال...';
    status.style.color = 'var(--gold)';
    try {
      const key = `${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      await storage.set(key, {
        table, type, label, time: nowStr(), ts: Date.now()
      });
      status.textContent = `✅ تم إرسال طلبك! (${label}) - سيصل النادل قريباً`;
      status.style.color = 'var(--green)';
    } catch (e) {
      status.textContent = '⚠️ حدث خطأ، حاول مرة أخرى';
      status.style.color = 'var(--red)';
    }
    setTimeout(() => {
      btnServer.disabled = false;
      btnBill.disabled = false;
    }, 8000);
  }

  btnServer.onclick = () => sendRequest('server', 'طلب نادل');
  btnBill.onclick = () => sendRequest('bill', 'طلب الفاتورة');
}

// ---------- STAFF VIEW ----------
async function renderStaff() {
  root.innerHTML = `
    <h1>Ard El Dyar</h1>
    <div class="sub">لوحة الطلبات - الموظفين</div>
    <div class="card" id="reqList">
      <div class="empty-state">جارٍ التحميل...</div>
    </div>
    <div class="small-note">اترك هذه الصفحة مفتوحة على الهاتف. سيرن تنبيه عند وصول طلب جديد.</div>
  `;
  const list = document.getElementById('reqList');
  let known = new Set();
  let firstLoad = true;

  async function poll() {
    try {
      let items = await storage.list();
      items.sort((a,b) => a.ts - b.ts);

      // ring for new ones
      if (!firstLoad) {
        for (const it of items) {
          if (!known.has(it.key)) beep();
        }
      }
      known = new Set(items.map(i => i.key));
      firstLoad = false;

      if (items.length === 0) {
        list.innerHTML = `<div class="empty-state">لا توجد طلبات حالياً ✅</div>`;
      } else {
        list.innerHTML = items.map(it => `
          <div class="req-item ${it.type}">
            <div class="req-left">
              <div class="req-table">طاولة ${it.table}</div>
              <div class="req-type">${it.type === 'server' ? '🛎️ طلب نادل' : '🧾 طلب الفاتورة'}</div>
              <div class="req-time">${it.time}</div>
            </div>
            <button class="done-btn" data-key="${it.key}">تم ✓</button>
          </div>
        `).join('');
        list.querySelectorAll('.done-btn').forEach(btn => {
          btn.onclick = async () => {
            const key = btn.getAttribute('data-key');
            try {
              await storage.delete(key);
              known.delete(key);
              btn.closest('.req-item').remove();
              if (list.children.length === 0) {
                list.innerHTML = `<div class="empty-state">لا توجد طلبات حالياً ✅</div>`;
              }
            } catch(e) {}
          };
        });
      }
    } catch (e) {
      list.innerHTML = `<div class="empty-state">⚠️ تعذر تحميل الطلبات</div>`;
    }
  }

  poll();
  setInterval(poll, 3000);
}

// ---------- SETUP / QR GENERATOR VIEW ----------
function renderSetup() {
  root.innerHTML = `
    <h1>Ard El Dyar</h1>
    <div class="sub">إعداد رموز QR للطاولات</div>

    <div class="tab-row">
      <button class="tab-btn active" id="tabQr">رموز الطاولات</button>
      <button class="tab-btn" id="tabStaffLink">رابط الموظفين</button>
    </div>

    <div class="card" id="setupCard">
      <label class="small-note">رابط الصفحة (بعد النشر/المشاركة):</label>
      <input id="baseUrl" placeholder="https://example.com/page.html" value="${window.location.origin + window.location.pathname}">
      <label class="small-note">عدد الطاولات:</label>
      <input id="tableCount" type="number" value="12" min="1" max="60">
      <button class="print-btn" id="genBtn">إنشاء الرموز</button>
      <div id="qrOutput" style="margin-top:18px;"></div>
    </div>
    <div class="small-note" style="max-width:420px; text-align:center;">
      💡 بعد ما تنشر هالصفحة (Publish/Share) من Claude، خلي الرابط يطلع فوق وبعدين اضغط "إنشاء الرموز". كل رمز خاص بطاولة معينة. اطبعهم وحطهم عالطاولات.
    </div>
  `;

  document.getElementById('tabStaffLink').onclick = () => {
    const base = document.getElementById('baseUrl') ? document.getElementById('baseUrl').value : (window.location.origin + window.location.pathname);
    document.getElementById('setupCard').innerHTML = `
      <p class="small-note">افتح هذا الرابط على هاتف الموظف (أي هاتف، تقدر تغيره وقت ما بدك):</p>
      <input readonly value="${base}?staff=1" onclick="this.select()">
      <p class="small-note">احفظه كـ "إضافة إلى الشاشة الرئيسية" من المتصفح لسهولة الوصول.</p>
    `;
  };
  document.getElementById('tabQr').onclick = () => renderSetup();

  document.getElementById('genBtn').onclick = () => {
    const base = document.getElementById('baseUrl').value.trim() || (window.location.origin + window.location.pathname);
    const count = parseInt(document.getElementById('tableCount').value) || 1;
    const out = document.getElementById('qrOutput');
    out.innerHTML = `<div class="qr-grid" id="qrGrid"></div>`;
    const grid = document.getElementById('qrGrid');
    for (let i = 1; i <= count; i++) {
      const cell = document.createElement('div');
      cell.className = 'qr-cell';
      const qrDiv = document.createElement('div');
      cell.appendChild(qrDiv);
      const label = document.createElement('div');
      label.className = 'qr-label';
      label.textContent = 'طاولة ' + i;
      cell.appendChild(label);
      grid.appendChild(cell);
      new QRCode(qrDiv, {
        text: `${base}?table=${i}`,
        width: 140,
        height: 140,
        colorDark: '#1a1408',
        colorLight: '#ffffff'
      });
    }
    const printBtn = document.createElement('button');
    printBtn.className = 'print-btn';
    printBtn.textContent = '🖨️ طباعة الرموز';
    printBtn.onclick = () => window.print();
    out.appendChild(printBtn);
  };
}

// ---------- ROUTER ----------
if (FIREBASE_URL.includes('REPLACE_WITH')) {
  root.innerHTML = `
    <h1>Ard El Dyar</h1>
    <div class="card" style="text-align:center; color:#d9534f;">
      ⚠️ لازم تربط قاعدة البيانات (Firebase) أولاً.<br><br>
      رجع لـ Claude وأرسل رابط الـ Database URL حتى أحدّث الملف.
    </div>
  `;
} else if (tableParam) {
  renderCustomer(tableParam);
} else if (isStaff) {
  renderStaff();
} else {
  renderSetup();
}
</script>
</body>
</html>
